<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Search | OS Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #3b82f6;
            --danger: #ef4444;
            --card: #121212;
            --text: #ffffff;
            --note: #1a1a1a;
            
            /* Couleurs pour l'animation du logo */
            --color-1: #60a5fa; /* Bleu */
            --color-2: #a855f7; /* Violet */
            --color-3: #ec4899; /* Rose */
            --color-4: #34d399; /* Vert Émeraude */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }

        body {
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 5vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- LOGO ANIMÉ (Nouveau) --- */
        @keyframes nexusFlow {
            0%, 100% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            
            /* Création du dégradé animé */
            background: linear-gradient(-45deg, var(--color-1), var(--color-2), var(--color-3), var(--color-4), var(--color-1));
            background-size: 400% 400%; /* Taille du dégradé pour qu'il puisse "couler" */
            
            -webkit-background-clip: text; /* Coupe l'arrière-plan selon le texte */
            -webkit-text-fill-color: transparent; /* Rend le texte transparent pour voir l'arrière-plan */
            
            margin-bottom: 1.5rem;
            pointer-events: none;
            
            /* Animations combinées : entrée et flux de couleurs */
            animation: 
                fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards,
                nexusFlow 8s ease-in-out infinite; /* Animation fluide et infinie */
        }

        .search-container { 
            width: 90%; max-width: 500px; margin-bottom: 2.5rem; opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s forwards;
        }

        .search-input {
            width: 100%; padding: 1.1rem 1.8rem; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--card);
            color: white; font-size: 1.1rem; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }

        .shortcuts-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem; width: 90%; max-width: 500px; margin-bottom: 2rem;
        }

        .shortcut-item { display: flex; flex-direction: column; align-items: center; gap: 8px; user-select: none; opacity: 0; }
        .animate-in { animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        .shortcut-icon {
            width: 60px; height: 60px; background: var(--card);
            border-radius: 18px; display: flex; align-items: center;
            justify-content: center; font-weight: 600; border: 1px solid #333;
            overflow: hidden; pointer-events: none;
        }
        .shortcut-icon img { width: 30px; height: 30px; object-fit: contain; }
        .shortcut-name { font-size: 0.7rem; opacity: 0.6; pointer-events: none; }

        /* --- SECTION NOTE RAPIDE --- */
        .note-section {
            width: 90%; max-width: 500px; margin-bottom: 2.5rem;
            opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
        }
        .note-header { font-size: 0.8rem; font-weight: 700; color: #888; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        
        .paste-btn {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .paste-btn:active { transform: scale(0.9); background: rgba(59, 130, 246, 0.2); }

        #quickNote {
            width: 100%; height: 120px; background: var(--note); border: 1px solid #222;
            border-radius: 20px; padding: 1.2rem; color: #ddd; font-family: inherit;
            font-size: 0.9rem; resize: none; outline: none; line-height: 1.5;
            transition: border-color 0.3s; touch-action: pan-y;
        }
        #quickNote:focus { border-color: #444; }

        /* --- SECTION NEWS --- */
        .news-section {
            width: 90%; max-width: 500px; padding-bottom: 100px;
            opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards;
        }
        .news-header { font-size: 0.9rem; font-weight: 700; color: var(--accent); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .news-card {
            background: var(--card); border-radius: 20px; padding: 1rem;
            margin-bottom: 1rem; border: 1px solid #222; display: flex; gap: 1rem;
            align-items: center; text-decoration: none; color: white; transition: 0.2s;
        }
        .news-card:active { transform: scale(0.98); background: #1a1a1a; }
        .news-content h4 { font-size: 0.85rem; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .news-meta { font-size: 0.65rem; opacity: 0.4; }

        /* UI MODAL & DRAG */
        .drop-zones { position: fixed; bottom: -150px; left: 0; width: 100%; display: flex; justify-content: center; gap: 50px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); padding-bottom: 60px; z-index: 1000; pointer-events: none; }
        .drop-zones.visible { transform: translateY(-220px); }
        .zone { width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); font-size: 1.3rem; transition: 0.2s; }
        .zone.edit { color: var(--accent); } .zone.delete { color: var(--danger); }
        .zone.active { transform: scale(1.2); background: rgba(255,255,255,0.15); border-color: currentColor; }
        .dragging { position: fixed; z-index: 9999; pointer-events: none; transform: scale(1.1); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 5000; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 2rem; border-radius: 25px; width: 85%; max-width: 350px; border: 1px solid #333; }
        .modal input { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 12px; outline: none; }
    </style>
</head>
<body>

    <div class="logo">NEXUS</div>

    <form class="search-container" id="searchForm">
        <input type="text" id="searchInput" class="search-input" placeholder="Recherche ou URL..." autocomplete="off">
    </form>

    <div class="shortcuts-grid" id="shortcutsGrid"></div>

    <div class="note-section">
        <div class="note-header">
            <div>NOTE RAPIDE <span id="noteStatus" style="opacity: 0.4; font-weight: 400; font-size: 0.7rem; margin-left: 8px;">Enregistré</span></div>
            <button class="paste-btn" onclick="pasteFromClipboard()">Coller</button>
        </div>
        <textarea id="quickNote" placeholder="Tapez quelque chose à mémoriser..."></textarea>
    </div>

    <div class="news-section">
        <div class="news-header">À la une</div>
        <div id="newsFeed"><div style="opacity:0.3; font-size:0.8rem;">Chargement des actus...</div></div>
    </div>

    <div class="drop-zones" id="dropZones">
        <div class="zone edit" id="editZone">✎</div>
        <div class="zone delete" id="deleteZone">✕</div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Nouveau site</h3>
            <input type="text" id="siteName" placeholder="Nom">
            <input type="text" id="siteUrl" placeholder="URL">
            <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; color:white; font-weight:700; margin-top:10px;">Enregistrer</button>
            <button onclick="closeModal()" style="width:100%; margin-top:15px; background:transparent; color:#666; border:none;">Annuler</button>
        </div>
    </div>

    <script>
        let shortcuts = JSON.parse(localStorage.getItem('nexus_shortcuts')) || [
            { name: 'YouTube', url: 'https://youtube.com' },
            { name: 'GitHub', url: 'https://github.com' }
        ];

        let dragItem = null, dragIdx = null, isDragging = false, isFinishing = false, timer, startPos = { x: 0, y: 0 };
        const grid = document.getElementById('shortcutsGrid'), zones = document.getElementById('dropZones');

        // --- GESTION DU BLOC-NOTES ---
        const noteArea = document.getElementById('quickNote');
        const noteStatus = document.getElementById('noteStatus');
        noteArea.value = localStorage.getItem('nexus_quicknote') || "";

        noteArea.addEventListener('input', saveNote);

        function saveNote() {
            noteStatus.innerText = "Enregistrement...";
            localStorage.setItem('nexus_quicknote', noteArea.value);
            clearTimeout(window.saveTimer);
            window.saveTimer = setTimeout(() => { noteStatus.innerText = "Enregistré"; }, 800);
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text) {
                    const start = noteArea.selectionStart;
                    const end = noteArea.selectionEnd;
                    const fullText = noteArea.value;
                    noteArea.value = fullText.substring(0, start) + text + fullText.substring(end);
                    saveNote();
                    noteArea.focus();
                }
            } catch (err) {
                alert("Accès au presse-papiers refusé. Vérifiez les autorisations de votre navigateur.");
            }
        }

        // --- RENDU SHORTCUTS ---
        function getFavicon(url) { try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; } catch(e) { return null; } }

        function render() {
            grid.innerHTML = shortcuts.map((s, i) => {
                const iconUrl = getFavicon(s.url);
                return `
                    <div class="shortcut-item animate-in" style="animation-delay: ${0.2 + (i * 0.05)}s" 
                         ontouchstart="onStart(event, ${i})" onmousedown="onStart(event, ${i})" onclick="handleLinkClick(event, ${i})">
                        <div class="shortcut-icon">
                            ${iconUrl ? `<img src="${iconUrl}" onerror="this.parentElement.innerHTML='${s.name.substring(0,2).toUpperCase()}'">` : s.name.substring(0,2).toUpperCase()}
                        </div>
                        <div class="shortcut-name">${s.name}</div>
                    </div>
                `;
            }).join('') + `<div class="shortcut-item animate-in" onclick="openModal()" style="animation-delay: ${0.2 + (shortcuts.length * 0.05)}s; opacity:0.4"><div class="shortcut-icon" style="border-style:dashed">+</div><div class="shortcut-name">Ajouter</div></div>`;
        }

        // --- NEWS API ---
        async function fetchNews() {
            try {
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/headlines/section/topic/TECHNOLOGY?hl=fr&gl=FR&ceid=FR:fr`);
                const data = await response.json();
                document.getElementById('newsFeed').innerHTML = data.items.slice(0, 5).map(item => `
                    <a href="${item.link}" class="news-card">
                        <div class="news-content">
                            <h4>${item.title}</h4>
                            <div class="news-meta">${item.pubDate.split(' ')[0]} • Google News</div>
                        </div>
                    </a>
                `).join('');
            } catch (e) { document.getElementById('newsFeed').innerHTML = '<div style="opacity:0.3;">Erreur de chargement.</div>'; }
        }

        // --- RECHERCHE ---
        document.getElementById('searchForm').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('searchInput').value.trim();
            if (!input) return;
            if (/^(https?:\/\/)?([\da-z.-]+)\.([a-z.]{2,6})([\/\w .-]*)*\/?$/.test(input)) {
                window.location.href = input.startsWith('http') ? input : 'https://' + input;
            } else {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(input)}`;
            }
        };

        // --- DRAG LOGIC ---
        function onStart(e, idx) {
            if (isFinishing) return;
            const t = e.touches ? e.touches[0] : e;
            const target = e.currentTarget;
            const r = target.getBoundingClientRect();
            startPos = { x: r.left, y: r.top };
            timer = setTimeout(() => {
                isDragging = true; dragIdx = idx;
                dragItem = target.cloneNode(true);
                dragItem.classList.add('dragging');
                dragItem.style.width = r.width + 'px';
                dragItem.style.animation = "none";
                dragItem.style.opacity = "1";
                document.body.appendChild(dragItem);
                zones.classList.add('visible');
                updatePos(t.clientX, t.clientY);
            }, 400);
        }

        function updatePos(x, y) {
            if (!dragItem || isFinishing) return;
            dragItem.style.left = `${x - 30}px`; dragItem.style.top = `${y - 30}px`;
            const eR = document.getElementById('editZone').getBoundingClientRect();
            const dR = document.getElementById('deleteZone').getBoundingClientRect();
            document.getElementById('editZone').classList.toggle('active', checkIn(x, y, eR));
            document.getElementById('deleteZone').classList.toggle('active', checkIn(x, y, dR));
        }

        function checkIn(x, y, r) { return x > r.left && x < r.right && y > r.top && y < r.bottom; }

        const handleMove = (e) => {
            if (!isDragging || isFinishing) { clearTimeout(timer); return; }
            if (e.cancelable) e.preventDefault();
            const t = e.touches ? e.touches[0] : e;
            updatePos(t.clientX, t.clientY);
        };

        const handleEnd = (e) => {
            clearTimeout(timer);
            if (!isDragging || !dragItem || isFinishing) return;
            const t = e.changedTouches ? e.changedTouches[0] : e;
            isFinishing = true;
            const eR = document.getElementById('editZone').getBoundingClientRect();
            const dR = document.getElementById('deleteZone').getBoundingClientRect();

            if (checkIn(t.clientX, t.clientY, dR)) {
                shortcuts.splice(dragIdx, 1);
                localStorage.setItem('nexus_shortcuts', JSON.stringify(shortcuts));
                cleanup(); render(); isFinishing = false;
            } else if (checkIn(t.clientX, t.clientY, eR)) {
                cleanup(); openModal(dragIdx); isFinishing = false;
            } else {
                dragItem.style.transition = "all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                dragItem.style.left = `${startPos.x}px`; dragItem.style.top = `${startPos.y}px`;
                dragItem.style.transform = "scale(1)";
                setTimeout(() => { cleanup(); render(); isFinishing = false; }, 400);
            }
        };

        function cleanup() { isDragging = false; if (dragItem) dragItem.remove(); dragItem = null; zones.classList.remove('visible'); }
        function handleLinkClick(e, idx) { if (isDragging || isFinishing) { e.preventDefault(); return; } window.location.href = shortcuts[idx].url; }

        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);

        let editIdx = null;
        function openModal(idx = null) {
            editIdx = idx; document.getElementById('modal').style.display = 'flex';
            document.getElementById('siteName').value = idx !== null ? shortcuts[idx].name : '';
            document.getElementById('siteUrl').value = idx !== null ? shortcuts[idx].url : '';
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function saveItem() {
            const n = document.getElementById('siteName').value, u = document.getElementById('siteUrl').value.trim();
            if (n && u) {
                const url = u.startsWith('http') ? u : 'https://' + u;
                if (editIdx !== null) shortcuts[editIdx] = { name: n, url };
                else shortcuts.push({ name: n, url });
                localStorage.setItem('nexus_shortcuts', JSON.stringify(shortcuts));
                render(); closeModal();
            }
        }

        render();
        fetchNews();
    </script>
</body>
</html>
