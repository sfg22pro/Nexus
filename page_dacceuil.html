<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Search</title>
    <style>
        :root {
            --bg: #050505;
            --accent: #3b82f6;
            --search-bg: #1a1a1a;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #3b82f6, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Le formulaire qui envoie vers Google */
        .search-form {
            width: 90%;
            max-width: 600px;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--search-bg);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        .search-btn {
            position: absolute;
            right: 10px;
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="logo">NEXUS</div>

    <form class="search-form" action="https://www.google.com/search" method="GET">
        <div class="search-container">
            <input type="text" name="q" class="search-input" placeholder="Rechercher avec Google..." required autofocus>
            <button type="submit" class="search-btn">Go</button>
        </div>
    </form>

    <p class="hint">Appuyez sur Entrée pour lancer la recherche</p>

</body>
</html>
